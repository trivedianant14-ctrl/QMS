<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="300" height="200" fill="#f5f5fb" rx="8"/>

  <!-- Heart outer border -->
  <rect x="40" y="16" width="220" height="158" rx="14" fill="white" stroke="#AFA9EC" stroke-width="2"/>

  <!-- Vertical septum -->
  <line x1="150" y1="16" x2="150" y2="174" stroke="#AFA9EC" stroke-width="1.5"/>

  <!-- AV (atrioventricular) horizontal line -->
  <line x1="40" y1="95" x2="260" y2="95" stroke="#AFA9EC" stroke-width="1.5"/>

  <!-- LA highlighted region (top-right, the answer) -->
  <rect x="151" y="17" width="108" height="77" rx="0" fill="#534AB7" opacity="0.07"/>

  <!-- Chamber text labels -->
  <text x="95"  y="64" text-anchor="middle" font-size="15" font-weight="700" fill="#3C3489">RA</text>
  <text x="205" y="64" text-anchor="middle" font-size="15" font-weight="700" fill="#3C3489">LA</text>
  <text x="95"  y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#3C3489">RV</text>
  <text x="205" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#3C3489">LV</text>

  <!-- Star marker on LA -->
  <circle cx="228" cy="46" r="13" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="228" y="51" text-anchor="middle" font-size="14" font-weight="800" fill="#FF6B6B">★</text>

  <!-- Subtle arrows: pulmonary veins → LA -->
  <path d="M264 35 Q276 35 276 56 Q276 76 264 76" fill="none" stroke="#97C459" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <polygon points="264,72 260,82 268,82" fill="#97C459" opacity="0.8"/>
  <text x="281" y="50" font-size="8" fill="#3B6D11" text-anchor="middle">Pulm.</text>
  <text x="281" y="60" font-size="8" fill="#3B6D11" text-anchor="middle">Veins</text>

  <!-- Caption -->
  <text x="150" y="194" text-anchor="middle" font-size="9" fill="#9898b0">Fig: Human Heart — Anterior View (Schematic)</text>
</svg>
